<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
    <script src="teste.js"></script>
    <script src="teste3.js"></script>
    
   

   
</head>
<body class ="login-body">

    <div id ="overlay" class="overlay" style="display: none;">
        <div class="modal">
            <p id="mensagem"></p>
            <button class="button-erro" onclick="fecharOverlay()">Fechar</button>
        </div>
    </div>
    <main>
        <div class="leftContainer">
        </div>
        <div class="righContainer">
            <form id="form-login" onsubmit="login(event)">
                <h1 class="h1-login">
                    Login
                </h1>
                <div class = "inputs">
                <div class="grupoLabelInput">
                    <label for="input-nome">Usuário</label>
                    <input id="input-nome" placeholder="usuario ou e-mail" type="text" required>
                    <p id="warning-username" class="warning-message">Nome de Usuário deve conter no mínimo 4 caracteres</p>
                </div>

                <div class="grupoLabelInput">
                    <label for="input-senha">Senha</label>
                    <input id="input-senha" placeholder="senha" type="password" required>
                </div>
            </div>
            <button class="button-login" id="button-login" type="submit">
                Login
            </button>

            </form>
        </div>

    </main>
    
    <button id="btn-help" class="help" onclick="showHelpMessage()">
        <img src="Imagem/img/help.svg">
    </button>
    <script>
        if(verificarLogado()){
            window.location.href = "dashboard.html"
        }
    </script>
    </body>
</html>
